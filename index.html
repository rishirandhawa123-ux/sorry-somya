<!DOCTYPE html>
<html>
<head>
<title>Sorry Somya</title>

<style>

body{
background: linear-gradient(135deg,#1d2b64,#f8cdda);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
color:white;
text-align:center;
overflow:hidden;
}

h1{
font-size:50px;
margin-bottom:20px;
}

#text{
font-size:22px;
max-width:600px;
}

.heart{
position:absolute;
color:red;
font-size:20px;
animation: fall 6s linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-100px);
opacity:1;
}
100%{
transform:translateY(100vh);
opacity:0;
}
}

</style>
</head>

<body>

<h1>Somya, I'm Sorry ❤️</h1>

<p id="text"></p>

<script>

let message = "hm tmko kbhi hurt ni krna chate the. You meant a lot to me and I truly respect the time we spent together. If I made mistakes, I sincerely apologize. hm chate h tm humsa khush rho.";

let i = 0;

function typing(){
if(i < message.length){
document.getElementById("text").innerHTML += message.charAt(i);
i++;
setTimeout(typing,50);
}
}

typing();

function createHeart(){
let heart = document.createElement("div");
heart.classList.add("heart");
heart.innerHTML = "❤️";

heart.style.left = Math.random()*100 + "vw";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
